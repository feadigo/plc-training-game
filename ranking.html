<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLC Training Game - World Ranking</title>

<style>

/* FONDO */

body{
background:radial-gradient(circle at center,#0b0f14,#000);
color:#00ff7b;
font-family:monospace;
text-align:center;
margin:0;
padding:40px 20px;
overflow:hidden;
}

/* TITULO */

h1{
font-size:32px;
letter-spacing:3px;
margin-bottom:10px;
text-shadow:0 0 15px #00ff7b;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

/* BOTON SONIDO */

#soundToggle{

position:fixed;
top:20px;
right:20px;

background:#000;
color:#00ff7b;

border:2px solid #00ff7b;
padding:8px 14px;

border-radius:6px;
cursor:pointer;

box-shadow:0 0 10px #00ff7b;

font-family:monospace;
z-index:9999;

}

/* TROFEO MASTER */

#champion{

max-width:420px;
margin:auto;
margin-bottom:25px;

background:#000;
border:3px solid gold;

border-radius:10px;
padding:15px;

box-shadow:
0 0 25px gold,
inset 0 0 10px rgba(255,215,0,0.4);

animation:champGlow 1.5s infinite alternate;

}

@keyframes champGlow{

from{box-shadow:0 0 20px gold}
to{box-shadow:0 0 35px gold}

}

.championTitle{
font-size:14px;
color:gold;
margin-bottom:5px;
}

.championName{
font-size:22px;
font-weight:bold;
}

.championScore{
font-size:18px;
}

/* NEW CHAMPION */

#newChampion{

position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);

background:gold;
color:black;

padding:20px 40px;

font-size:30px;
font-weight:bold;

border-radius:10px;

box-shadow:0 0 40px gold;

z-index:9999;

display:none;

}

/* PANEL RANKING */

#ranking{

max-width:420px;
margin:auto;

background:#000;

border:3px solid #00ff7b;

border-radius:10px;

padding:15px;

box-shadow:
0 0 25px #00ff7b,
inset 0 0 15px rgba(0,255,120,0.2);

height:420px;
overflow:hidden;

}

/* CONTENEDOR SCROLL */

#rankingList{
transition:transform 0.1s linear;
}

/* FILAS */

.rank{

display:flex;
justify-content:space-between;

padding:10px;
margin:5px 0;

border-bottom:1px solid #222;

opacity:0;
transform:translateY(10px);

animation:rankIn .5s forwards;

}

@keyframes rankIn{

to{
opacity:1;
transform:translateY(0);
}

}

/* MEDALLAS */

.rank1{
color:gold;
font-size:18px;
text-shadow:0 0 10px gold;
}

.rank2{
color:silver;
}

.rank3{
color:#cd7f32;
}

/* NOMBRE */

.name{
text-align:left;
flex:1;
}

/* SCORE */

.score{
font-weight:bold;
}

/* CRT */

body::after{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
rgba(255,255,255,0.03) 50%,
transparent 50%
);

background-size:100% 4px;

pointer-events:none;

}

/* FOOTER */

.footer{
margin-top:25px;
font-size:12px;
color:#777;
}

@media(max-width:600px){

h1{font-size:24px;}
.championName{font-size:18px;}
.rank{font-size:14px;}

}

</style>

</head>

<body>

<button id="soundToggle">🔊</button>

<h1>🏆 PLC TRAINING GAME</h1>
<div class="subtitle">WORLD RANKING</div>

<div id="champion"></div>

<div id="ranking">
<div id="rankingList"></div>
</div>

<div id="newChampion">👑 NEW CHAMPION</div>

<div class="footer">
Ranking global en tiempo real
</div>

<!-- SONIDOS -->

<audio id="championSound" src="sounds/champion.mp3"></audio>
<audio id="rankingSound" src="sounds/ranking.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyCHD_4dYcJjRYw1LvMm03iDLNyktjOgIR4",
authDomain:"plc-training-game.firebaseapp.com",
projectId:"plc-training-game",
storageBucket:"plc-training-game.firebasestorage.app",
messagingSenderId:"444769439771",
appId:"1:444769439771:web:253d9651ebef96ab9ba8be"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

/* SONIDO */

let soundEnabled=true

const rankingSound=document.getElementById("rankingSound")
const championSound=document.getElementById("championSound")

document.getElementById("soundToggle").onclick=()=>{

soundEnabled=!soundEnabled

document.getElementById("soundToggle").innerText=soundEnabled?"🔊":"🔇"

}

/* SONIDO AL ABRIR */

window.addEventListener("click",()=>{

if(soundEnabled){

rankingSound.currentTime=0
rankingSound.play().catch(()=>{})

}

},{once:true})

/* QUERY TOP 20 */

const q=query(
collection(db,"ranking"),
orderBy("score","desc"),
limit(20)
)

let currentChampion=""

/* RANKING REALTIME */

onSnapshot(q,(snapshot)=>{

let html=""
let championHTML=""

let i=0

snapshot.forEach((doc)=>{

let r=doc.data()

if(i==0){

championHTML=`
<div class="championTitle">👑 PLC MASTER</div>
<div class="championName">${r.name}</div>
<div class="championScore">${r.score}</div>
`

if(currentChampion!==r.name){

currentChampion=r.name

if(soundEnabled){

championSound.currentTime=0
championSound.play().catch(()=>{})

}

showNewChampion()

}

}

let medal=""
let cls="rank"

if(i==0){medal="🥇";cls+=" rank1"}
else if(i==1){medal="🥈";cls+=" rank2"}
else if(i==2){medal="🥉";cls+=" rank3"}
else{medal=(i+1)+"."}

html+=`
<div class="${cls}" style="animation-delay:${i*0.1}s">
<span class="name">${medal} ${r.name}</span>
<span class="score">${r.score}</span>
</div>
`

i++

})

document.getElementById("rankingList").innerHTML=html
document.getElementById("champion").innerHTML=championHTML

})

/* NEW CHAMPION ANIMACION */

function showNewChampion(){

let div=document.getElementById("newChampion")

div.style.display="block"

setTimeout(()=>{
div.style.display="none"
},2000)

}

/* SCROLL ARCADE */

let scroll=0

setInterval(()=>{

scroll+=0.3

let list=document.getElementById("rankingList")

list.style.transform=`translateY(${-scroll}px)`

if(scroll>200)scroll=0

},30)

</script>

</body>
</html>
