<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLC Training Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="newRecord">🏆 NEW RECORD!</div>

<div class="plc">

<div class="headerPanel">

<div class="logoBlock">
<div class="brand">TecnoAmika</div>
</div>

<div class="titleBlock">
<div class="gameTitle">PLC TRAINING GAME</div>
<div class="licenseMini">Licenciado bajo Creative Commons CC-BY-NC · FADG</div>
</div>

</div>

<div class="inputs">

<button id="I0" onclick="pulse(0)">I0</button>
<button id="I1" onclick="pulse(1)">I1</button>
<button id="I2" onclick="pulse(2)">I2</button>
<button id="I3" onclick="pulse(3)">I3</button>
<button id="I4" onclick="pulse(4)">I4</button>
<button id="I5" onclick="pulse(5)">I5</button>
<button id="I6" onclick="pulse(6)">I6</button>
<button id="I7" onclick="pulse(7)">I7</button>

</div>

<div class="cpu">

<div class="plc-leds">

<div class="led-group">
<span>RUN</span>
<div id="runLed" class="led run"></div>
</div>

<div class="led-group">
<span>ERR</span>
<div id="errorLed" class="led error"></div>
</div>

</div>

<div class="display">

<div id="startPanel">
<input id="playerName" maxlength="12" placeholder="Jugador/a">
<button class="startBtn ledButton" onclick="startGame()">START</button>
</div>

<div id="gamePanel">

<div class="status">
<span id="fase">Fase 1</span>
<span id="score">Score 0</span>
</div>

<div id="recordPanel">
🏆 RECORD
<span id="recordName">---</span>
<span id="recordScore">0</span>
</div>

<p id="mensaje">Memoriza la secuencia</p>

<div id="expertMode"></div>

<div class="controls">

<button id="retryBtn" class="retryBtn ledButton" onclick="retry()">RETRY</button>

<button class="stopBtn ledButton" onclick="stopGame()">STOP</button>

<button class="rankBtn ledButton" onclick="toggleRanking()">🏆 RECORDS</button>

<button id="soundBtn" onclick="toggleSound()">🔊</button>

</div>

<div id="rankingList"></div>

</div>

</div>

</div>

<div class="outputs">

<div class="relay" id="Q0">Q0</div>
<div class="relay" id="Q1">Q1</div>
<div class="relay" id="Q2">Q2</div>
<div class="relay" id="Q3">Q3</div>

<div class="valve" id="Q4">Q4</div>
<div class="valve" id="Q5">Q5</div>
<div class="valve" id="Q6">Q6</div>
<div class="valve" id="Q7">Q7</div>

</div>

</div>

<script type="module" src="game.js"></script>

</body>
</html>
